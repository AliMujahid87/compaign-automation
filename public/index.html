<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campaign Automation</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="container">
    <h1>🚀 Campaign Automation</h1>
    <form id="campaignForm" class="glass-card">
      <div class="form-group">
        <label for="platform"><i class="fas fa-globe"></i> Select Platform</label>
        <select id="platform" name="platform" required>
          <option value="linkedin">LinkedIn (Professional)</option>
          <option value="gmail">Gmail (Email Campaign)</option>
          <option value="discord">Discord (Community)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="subject"><i class="fas fa-heading"></i> Message Subject</label>
        <input type="text" id="subject" name="subject" placeholder="e.g. Partnership Opportunity for {{name}}" required />
      </div>

      <div class="form-group">
        <label for="message"><i class="fas fa-comment-dots"></i> Message Template</label>
        <textarea id="message" name="message" rows="5" placeholder="Hello {{name}}, ..." required></textarea>
      </div>

      <div class="form-group">
        <label for="attachment"><i class="fas fa-paperclip"></i> Attachment (Optional)</label>
        <input type="file" id="attachment" name="attachment" />
      </div>

      <div class="form-group">
        <label for="contacts"><i class="fas fa-file-csv"></i> Target Contacts CSV</label>
        <input type="file" id="contacts" name="contacts" accept=".csv" required />
      </div>

      <button type="submit" class="primary-btn">
        <i class="fas fa-rocket"></i> Launch Campaign
      </button>
    </form>

    <div id="progress" class="hidden">
      <p>Processing… <span id="status"></span></p>
      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>
    </div>

    <div id="results" class="hidden glass-card">
      <h2>Results</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Contact</th>
            <th>Status</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
      <button id="downloadBtn" class="secondary-btn">Download CSV</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('campaignForm');
    const progressDiv = document.getElementById('progress');
    const statusSpan = document.getElementById('status');
    const progressFill = document.getElementById('progressFill');
    const resultsDiv = document.getElementById('results');
    const resultsBody = document.getElementById('resultsBody');
    const downloadBtn = document.getElementById('downloadBtn');
    let resultsData = [];

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const platform = document.getElementById('platform').value;
      const contactsFile = document.getElementById('contacts').files[0];
      const attachmentFile = document.getElementById('attachment').files[0];
      const message = document.getElementById('message').value;
      const subject = document.getElementById('subject').value;

      const formData = new FormData();
      formData.append('contacts', contactsFile);
      if (attachmentFile) {
        formData.append('attachment', attachmentFile);
      }
      formData.append('message', message);
      formData.append('subject', subject);

      progressDiv.classList.remove('hidden');
      statusSpan.textContent = 'Uploading…';
      progressFill.style.width = '10%';

      try {
        const response = await fetch(`/api/send/${platform}`, {
          method: 'POST',
          body: formData,
        });
        const data = await response.json();
        resultsData = data.results || [];
        renderResults();
        progressFill.style.width = '100%';
        statusSpan.textContent = 'Done';
        resultsDiv.classList.remove('hidden');
      } catch (err) {
        console.error(err);
        statusSpan.textContent = 'Error';
        alert('Campaign failed: ' + err.message);
      }
    });

    function renderResults() {
      resultsBody.innerHTML = '';
      resultsData.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.name || ''}</td><td>${r.email || r.linkedinId || r.discordId || ''}</td><td>${r.status}</td><td>${r.details}</td>`;
        resultsBody.appendChild(tr);
      });
    }

    downloadBtn.addEventListener('click', () => {
      const csvRows = [];
      const headers = Object.keys(resultsData[0] || {});
      csvRows.push(headers.join(','));
      resultsData.forEach(row => {
        csvRows.push(headers.map(h => `"${(row[h] || '').toString().replace(/"/g, '""')}`).join(','));
      });
      const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `campaign_${new Date().toISOString()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>

</html>
