<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus | Campaign Automation</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="container">
    <h1><i class="fas fa-layer-group"></i> NEXUS</h1>

    <div class="glass-card">
      <form id="campaignForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="platform"><i class="fas fa-network-wired"></i> Platform</label>
            <select id="platform" name="platform" required>
              <option value="gmail">Gmail Outreach</option>
              <option value="whatsapp">WhatsApp Direct</option>
              <option value="linkedin">LinkedIn Connect</option>
            </select>
          </div>

          <div class="form-group" id="subjectGroup">
            <label for="subject"><i class="fas fa-heading"></i> Subject Line</label>
            <input type="text" id="subject" name="subject" placeholder="e.g. Hello {{name}}" required />
          </div>

          <div class="form-group full-width">
            <label for="message"><i class="fas fa-pen-nib"></i> Message Template</label>
            <textarea id="message" name="message" placeholder="Craft your message here... Use {{name}} for personalization." required></textarea>
          </div>

          <div class="form-group" id="attachmentGroup">
            <label for="attachment"><i class="fas fa-paperclip"></i> Media Attachment</label>
            <input type="file" id="attachment" name="attachment" />
          </div>

          <div class="form-group">
            <label for="contacts"><i class="fas fa-file-csv"></i> Contact List (CSV)</label>
            <input type="file" id="contacts" name="contacts" accept=".csv" required />
          </div>
        </div>

        <button type="submit" class="primary-btn">
          <i class="fas fa-paper-plane"></i> Launch Campaign
        </button>
      </form>

      <div class="auth-container">
        <p class="auth-title">Authentication & Setup</p>
        <div class="auth-buttons">
          <a href="/api/gmail/auth" class="auth-btn"><i class="fab fa-google"></i> Gmail Access</a>
          <a href="#" class="auth-btn"><i class="fab fa-linkedin"></i> LinkedIn Access</a>
          <div class="auth-btn" id="whatsappStatus"><i class="fab fa-whatsapp"></i> WhatsApp Ready</div>
        </div>
      </div>
    </div>

    <div id="progress" class="hidden glass-card">
      <div class="progress-info">
        <span>Campaign Execution</span>
        <span id="status">0%</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="progressFill"></div>
      </div>
    </div>

    <div id="results" class="hidden glass-card">
      <div class="results-header">
        <h2>Execution Intelligence</h2>
        <button id="downloadBtn" class="secondary-btn">
          <i class="fas fa-download"></i> Export CSV
        </button>
      </div>
      <div class="results-table-container">
        <table>
          <thead>
            <tr>
              <th>Contact Name</th>
              <th>Identifier</th>
              <th>Status</th>
              <th>Execution Details</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('campaignForm');
    const progressDiv = document.getElementById('progress');
    const statusSpan = document.getElementById('status');
    const progressFill = document.getElementById('progressFill');
    const resultsDiv = document.getElementById('results');
    const resultsBody = document.getElementById('resultsBody');
    const downloadBtn = document.getElementById('downloadBtn');
    const platformSelect = document.getElementById('platform');
    const subjectGroup = document.getElementById('subjectGroup');
    const attachmentGroup = document.getElementById('attachmentGroup');
    
    let resultsData = [];

    // Check WhatsApp status
    async function checkWhatsAppStatus() {
      try {
        const res = await fetch('/api/whatsapp/status');
        const data = await res.json();
        const statusBtn = document.getElementById('whatsappStatus');
        if (data.ready) {
          statusBtn.innerHTML = '<i class="fab fa-whatsapp"></i> WhatsApp Ready';
          statusBtn.style.color = 'var(--secondary)';
          statusBtn.style.borderColor = 'var(--secondary)';
        } else {
          statusBtn.innerHTML = '<i class="fab fa-whatsapp"></i> WhatsApp Not Logged In';
          statusBtn.style.color = '#ff5252';
          statusBtn.style.borderColor = '#ff5252';
        }
      } catch (e) {
        console.error('Status check failed', e);
      }
    }
    
    // Poll status every 5 seconds
    setInterval(checkWhatsAppStatus, 5000);
    checkWhatsAppStatus();

    // Toggle fields based on platform
    platformSelect.addEventListener('change', (e) => {
      if (e.target.value === 'whatsapp') {
        subjectGroup.classList.add('hidden');
        attachmentGroup.classList.add('hidden');
        document.getElementById('subject').required = false;
      } else {
        subjectGroup.classList.remove('hidden');
        attachmentGroup.classList.remove('hidden');
        document.getElementById('subject').required = true;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const platform = platformSelect.value;
      const contactsFile = document.getElementById('contacts').files[0];
      const attachmentFile = document.getElementById('attachment').files[0];
      const message = document.getElementById('message').value;
      const subject = document.getElementById('subject').value;

      const formData = new FormData();
      formData.append('contacts', contactsFile);
      if (attachmentFile) formData.append('attachment', attachmentFile);
      formData.append('message', message);
      formData.append('subject', subject);

      progressDiv.classList.remove('hidden');
      statusSpan.textContent = 'Initializing...';
      progressFill.style.width = '15%';

      try {
        const response = await fetch(`/api/send/${platform}`, {
          method: 'POST',
          body: formData,
        });
        const data = await response.json();
        
        if (data.error) throw new Error(data.error);
        
        resultsData = data.results || [];
        renderResults();
        
        progressFill.style.width = '100%';
        statusSpan.textContent = 'Completed';
        resultsDiv.classList.remove('hidden');
      } catch (err) {
        console.error(err);
        statusSpan.textContent = 'Failed';
        progressFill.style.background = '#ff5252';
        alert('Transmission Error: ' + err.message);
      }
    });

    function renderResults() {
      resultsBody.innerHTML = '';
      resultsData.forEach(r => {
        const tr = document.createElement('tr');
        const contactInfo = r.email || r.phone || r.number || 'N/A';
        const statusClass = r.status === 'sent' ? 'status-sent' : 'status-error';
        const statusLabel = r.status.toUpperCase();
        
        tr.innerHTML = `
          <td>${r.name || 'N/A'}</td>
          <td>${contactInfo}</td>
          <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
          <td>${r.details || '-'}</td>
        `;
        resultsBody.appendChild(tr);
      });
    }

    downloadBtn.addEventListener('click', () => {
      const csvRows = [];
      const headers = Object.keys(resultsData[0] || {});
      csvRows.push(headers.join(','));
      resultsData.forEach(row => {
        csvRows.push(headers.map(h => `"${(row[h] || '').toString().replace(/"/g, '""')}"`).join(','));
      });
      const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `nexus_report_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>

</html>
